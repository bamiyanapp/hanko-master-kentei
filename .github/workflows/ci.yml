name: CI
run-name: CI ${{ github.event.pull_request.title }}

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    uses: bamiyanapp/dev-standards/.github/workflows/reusable-ci.yml@main
    with:
      node_version: "24"
      workspaces: true
      enable_release_sync: false
    secrets:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
