name: CD
run-name: CD ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Sync main to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          # releaseブランチをチェックアウト、または作成
          git checkout release || git checkout -b release
          git reset --hard origin/main
          git push origin release --force --tags
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Dry-run Semantic-release
        id: dryrun
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          NEXT_TAG=$(npx semantic-release --dry-run | grep "The next release version is" | awk '{print $6}')
          echo "NEXT_TAG=$NEXT_TAG" >> $GITHUB_ENV
      - name: Check tag existence
        run: |
          if git rev-parse "refs/tags/$NEXT_TAG" >/dev/null 2>&1; then
            echo "Tag $NEXT_TAG already exists. Skipping release."
            exit 0
          fi

      # デバッグ: Release ブランチの情報を出力
      - name: Debug Release branch
        run: |
          echo "===== RELEASE BRANCH ====="
          echo "Branch: $(git branch --show-current)"
          echo "Commit: $(git rev-parse HEAD)"
          echo "Tags containing HEAD:"
          git tag --contains HEAD
          echo "All tags:"
          git fetch --tags origin
          git tag -l | grep v1.1
    
      # デバッグ: Main ブランチの情報も確認
      - name: Debug Main branch
        run: |
          echo "===== MAIN BRANCH ====="
          git fetch origin main --depth=1
          git checkout origin/main
          echo "Branch: $(git branch --show-current)"
          echo "Commit: $(git rev-parse HEAD)"
          echo "Tags containing HEAD:"
          git tag --contains HEAD
          echo "All tags:"
          git fetch --tags origin
          git tag -l | grep v1.1
          # Release ブランチに戻す
          git checkout release
      
      - name: Check for tag conflicts
        id: check-tags
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # semantic-release が付ける予定の次バージョンを確認
          NEXT_TAG=$(npx semantic-release --dry-run | grep "The next release version is" | awk '{print $6}')
          echo "NEXT_TAG=$NEXT_TAG" >> $GITHUB_ENV
          # 既存タグと重複していないか確認
          if git rev-parse "refs/tags/$NEXT_TAG" >/dev/null 2>&1; then
            echo "Tag $NEXT_TAG already exists. Exiting."
            exit 0
          fi
          git fetch --tags origin
          git tag --contains HEAD

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          # DEBUG: semantic-release:*
        run: |
          git fetch --tags --force
          NEXT_VERSION=$(npx semantic-release --dry-run | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "Next version: $NEXT_VERSION"
          # ★ リモートタグチェック（これが重要）
          if git ls-remote --tags origin | grep -q "refs/tags/v$NEXT_VERSION$"; then
            echo "Tag v$NEXT_VERSION already exists on remote. Skipping release."
            exit 0
          fi      
          npx semantic-release
      - name: Create PR from release to main
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.BOT_TOKEN }}
          base: main
          branch: sync-release-to-main # 実際に作成されるブランチ名
          title: "Sync release branch into main"
          body: "Automated PR to sync release changes into main."
          draft: false
          commit-message: "chore: sync release branch into main [skip ci]"
  build-and-deploy-frontend:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: release # Checkout the release branch for deployment
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Show GitHub Pages URL
        run: |
          echo "Pages URL: ${{ steps.deployment.outputs.page_url }}"

  deploy-backend:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: release # Checkout the release branch for deployment
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm install
      - name: 🚀 Deploy Backend (Serverless Framework)
        working-directory: backend
        run: npx serverless deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: 🌱 Seed Database
        working-directory: backend
        run: node seed.js
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
